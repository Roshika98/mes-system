type UnitOfMeasure {
  id: ID!
  code: String!
  name: String!
}

input CreateUnitOfMeasureInput {
  code: String!
  name: String!
}

extend type Query {
  unitsOfMeasure: [UnitOfMeasure!]!
  unitOfMeasure(id: ID!): UnitOfMeasure
}

extend type Mutation {
  createUnitOfMeasure(input: CreateUnitOfMeasureInput!): UnitOfMeasure!
}
