type ProductVariant {
  id: ID!
  product: Product!
  productId: ID!
  sku: String!
  barcode: String
  uom: UnitOfMeasure
  uomId: ID!
  price: Float!
  routingId: ID
  attributes: [ProductVariantAttribute!]!
}

type ProductVariantAttribute {
  attributeId: ID!
  attribute: ProductAttribute!
  value: String!
}

type ProductAttribute {
  id: ID!
  name: String!
}

input CreateProductVariantInput {
  productId: ID!
  sku: String!
  barcode: String
  uomId: ID!
  price: Float!
  routingId: ID
}

input UpdateProductVariantInput {
  sku: String
  barcode: String
  uomId: ID
  price: Float
  routingId: ID
}

extend type Query {
  productVariants(productId: ID!): [ProductVariant!]!
  productVariant(id: ID!): ProductVariant
  productVariantBySku(sku: String!): ProductVariant
}

extend type Mutation {
  createProductVariant(input: CreateProductVariantInput!): ProductVariant!
  updateProductVariant(id: ID!, input: UpdateProductVariantInput!): ProductVariant!
  deleteProductVariant(id: ID!): Boolean!
}
